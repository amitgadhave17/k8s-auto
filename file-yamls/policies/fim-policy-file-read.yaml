apiVersion: qualys.com/v1
kind: FimPolicy
metadata:
 name: monitor-file-read
spec:
 base-policy: "file-read"
 action: "audit"
 monitor-paths:
  - "/etc/passwd"
  - "/etc/shadow"
  - "/.git"
  - "/app/.git"
  - "/usr/src/app/.git"
  - "/root/.git"
  - "/etc/apache2/"
  - "/etc/httpd/"
  - "/etc/nginx/"
  - "/usr/local/etc/"
  - "/var/www/html/"
  - "/etc/secrets/"
#  - "/run/secrets/"
  - "/secrets/"
  - "/.env"
  - "/app/"
  - "/srv/"
  - "/var/lib/jenkins/"
  - "/opt/sonarqube/conf/"
  - "/var/atlassian/application-data/confluence/"
  - "/.docker/"
  - "/kaniko/.docker/"
  - "/.npmrc"
  - "/.pypirc"
  - "/.netrc"
  - "/.git/"
  - "/.ssh/"
  - "/.git-credentials"
  - "/root/.git-credentials"
  - "/root/.ssh/"
  - "/root/.git/"
  - "/etc/ansible/"
  - "/app/.terraform/terraform.tfstate"
  - "/.terraform/terraform.tfstate"
  - "/.aws/"
  - "/.azure/"
  - "/.config/"
  - "/etc/ssl/private"
  - "/etc/letsencrypt/live/
  - "/var/run/secrets/"
  - "/var/run/secrets/kubernetes.io/serviceaccount/"
#read shell configuration files
  - "/etc/profile"
  - "/etc/bash.bashrc"
  - "/etc/zshrc"
  - "/etc/zprofile"
  - "/etc/csh.cshrc"
  - "/etc/ksh.kshrc"
  - "/root/.bashrc"
  - "/root/.profile"
  - "/root/.bash_profile"
  - "/root/.bash_login"
  - "/root/.zshrc"
  - "/root/.zprofile"
  - "/root/.zlogin"
  - "/root/.cshrc"
  - "/root/.tcshrc"
  - "/root/.kshrc"