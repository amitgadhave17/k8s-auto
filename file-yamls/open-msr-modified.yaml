apiVersion: v1
kind: Pod
metadata:
  name: open-msr-modified
spec:
  containers:
    - name: open-msr-modified
      image: angelrita/base-ubuntu:latest
      command: ['sh']
      args: ['-c', 'mount -o remount,rw /sys; echo "on" | sudo tee /sys/module/msr/parameters/allow_writes; sleep infinity']
      securityContext:
        privileged: true