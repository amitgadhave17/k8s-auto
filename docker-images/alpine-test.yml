apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpine-test
spec:
  selector:
    matchLabels:
      app: alpine-test
  replicas: 1 # tells deployment to run 1 pods matching the template
  template: # create pods using pod definition in this template
    metadata:
      labels:
        app: alpine-test
    spec:
      dnsConfig:
        nameservers:
          - 8.8.8.8
      containers:
      - name: alpine-test
        image: alpine
        command: ["sleep"]
        args: ["infinity"]
        ports:
        - containerPort: 80
