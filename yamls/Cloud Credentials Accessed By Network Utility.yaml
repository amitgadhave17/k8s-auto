#command: TOKEN=`curl -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600"`; curl -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/

apiVersion: v1
kind: Pod
metadata:
  name: cloud-credentials-accessed-by-network-utility
spec:
  containers:
  - name: cloud-credentials-accessed-by-network-utility
    image: angelrita/base-ubuntu:latest
    #imagePullPolicy: Never
    command: ['sh']
    args: ['-c', 'TOKEN=`curl -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600"`; curl -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/']