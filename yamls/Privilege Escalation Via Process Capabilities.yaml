apiVersion: v1
kind: Pod
metadata:
  name: prv-esc-process-cap
spec:
  containers:
  - name: prv-esc-process-cap
    image: angelrita/base-ubuntu:latest
    #imagePullPolicy: Never
    command: ["sh"]
    args: ['-c', 'cp /bin/bash /tmp/testbash; sudo setcap cap_sys_ptrace+ep /tmp/testbash; sudo -u test /tmp/testbash -c whoami; sleep infinity']
