#command: java (jetty) spawns shell (Jetty path traversal RCE)
#note: actor_process_name should be java with jetty in cmd_line for full rule match

apiVersion: v1
kind: Pod
metadata:
  name: jetty-path-traversal-rce
spec:
  restartPolicy: Never
  containers:
  - name: jetty-path-traversal-rce
    image: angelrita/base-ubuntu:latest
    #imagePullPolicy: Never
    command: ['sh']
    args: ["-c", "cp /bin/bash java; ./java -c 'bash -c id' jetty; sleep infinity"]
