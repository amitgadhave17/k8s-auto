apiVersion: v1
kind: Pod
metadata:
  name: suspicious-network-utility-executed
spec:
  restartPolicy: Never
  containers:
  - name: suspicious-network-utility-executed
    image: angelrita/base-ubuntu:latest
    #imagePullPolicy: Never
    command: ['sh']
    args: ['-c', 'tcpdump -i eth0; sleep infinity']
