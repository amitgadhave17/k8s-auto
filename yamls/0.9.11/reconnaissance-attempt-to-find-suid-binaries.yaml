apiVersion: v1
kind: Pod
metadata:
  name: reconnaissance-attempt-to-find-suid-binaries
spec:
  containers:
    - name: reconnaissance-attempt-to-find-suid-binaries
      image: angelrita/base-ubuntu:latest
      command: ['sh']
      args: ['-c', 'find / -xdev -type f -perm -4000 -ls 2>/dev/null; sleep infinity']
